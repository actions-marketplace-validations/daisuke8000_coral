# CI workflow for Coral itself
name: CI

on:
  push:
    branches: [main]
    paths:
      - '**.rs'
      - '**.toml'
      - 'ui/**'
      - 'sandbox/**'
      - 'action.yml'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main]
    paths:
      - '**.rs'
      - '**.toml'
      - 'ui/**'
      - 'sandbox/**'
      - 'action.yml'
      - '.github/workflows/ci.yml'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: Rust Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9  # stable
        with:
          toolchain: stable

      - name: Cache cargo
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306  # v5.0.3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Clippy
        run: cargo clippy -- -D warnings

      - name: Build
        run: cargo build --release

      - name: Test
        run: cargo test

  ui:
    name: UI Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build (Static Mode)
        run: npm run build:static

      - name: Upload UI Artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: ui-dist
          path: ui/dist
          retention-days: 7

  action-test:
    name: GitHub Action Test
    runs-on: ubuntu-latest
    needs: [rust, ui]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Test Action (JSON only)
        id: json-test
        uses: ./
        with:
          proto-path: 'sandbox'

      - name: Verify JSON output
        run: |
          echo "=== JSON path ==="
          echo "coral-output/graph.json"
          echo ""
          echo "=== JSON (first 30 lines) ==="
          head -30 coral-output/graph.json

      - name: Test Action (with Pages)
        id: pages-test
        uses: ./
        with:
          proto-path: 'sandbox'
          generate-pages: 'true'

      - name: Verify Pages output
        run: |
          echo "=== Pages files ==="
          ls -la coral-output/html/
          test -f coral-output/html/index.html && echo "index.html exists"
          test -f coral-output/html/graph.json && echo "graph.json exists"

      - name: Setup Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/configure-pages@1f0c5cde4bc74cd7e1254d0cb4de8d49e9068c7d  # v4.0.0

      - name: Upload Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b  # v4.0.0
        with:
          path: coral-output/html

  deploy-pages:
    name: Deploy to GitHub Pages
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: action-test
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e  # v4.0.5
