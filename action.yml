name: 'Coral Proto Visualizer'
description: 'Visualize .proto file dependencies from gRPC/Connect projects'
author: 'daisuke8000'

branding:
  icon: 'git-branch'
  color: 'purple'

inputs:
  proto-path:
    description: 'Path to proto files directory'
    required: false
    default: 'proto'
  buf-config:
    description: 'Path to buf.yaml configuration file (relative to proto-path)'
    required: false
    default: ''
  comment-on-pr:
    description: 'Post analysis and diff as PR comment (true/false)'
    required: false
    default: 'false'
  github-token:
    description: 'GitHub token for PR comments and API access'
    required: false
    default: ''
  generate-pages:
    description: 'Generate static HTML for GitHub Pages (true/false)'
    required: false
    default: 'false'
  version:
    description: 'Coral version to download (defaults to the action ref tag)'
    required: false
    default: ''

outputs:
  json-path:
    description: 'Path to the generated JSON file'
    value: ${{ steps.generate.outputs.json-path }}
  html-path:
    description: 'Path to the generated HTML directory (if generate-pages is true)'
    value: ${{ steps.pages.outputs.html-path }}
  markdown-report:
    description: 'Detailed markdown report of proto dependencies'
    value: ${{ steps.generate.outputs.markdown-report }}
  diff-report:
    description: 'Diff report showing changes from base branch'
    value: ${{ steps.diff.outputs.diff-report }}

runs:
  using: 'composite'
  steps:
    - name: Validate inputs
      shell: bash
      env:
        INPUT_PROTO_PATH: ${{ inputs.proto-path }}
        INPUT_BUF_CONFIG: ${{ inputs.buf-config }}
      run: |
        if [[ "$INPUT_PROTO_PATH" =~ [^a-zA-Z0-9_./-] ]]; then
          echo "::error::proto-path contains invalid characters. Only alphanumeric, dots, underscores, hyphens, and slashes are allowed."
          exit 1
        fi
        if [[ -n "$INPUT_BUF_CONFIG" && "$INPUT_BUF_CONFIG" =~ [^a-zA-Z0-9_./-] ]]; then
          echo "::error::buf-config contains invalid characters. Only alphanumeric, dots, underscores, hyphens, and slashes are allowed."
          exit 1
        fi

    - name: Setup buf CLI
      uses: bufbuild/buf-setup-action@v1
      with:
        github_token: ${{ inputs.github-token || github.token }}

    - name: Download Coral binary
      id: download-coral
      continue-on-error: true
      shell: bash
      env:
        INPUT_VERSION: ${{ inputs.version }}
        ACTION_REF: ${{ github.action_ref }}
        ACTION_PATH: ${{ github.action_path }}
      run: |
        CORAL_VERSION="${INPUT_VERSION:-$ACTION_REF}"
        OS="$(uname -s | tr '[:upper:]' '[:lower:]')"
        ARCH="$(uname -m)"
        case "$ARCH" in
          x86_64)        ARCH="x86_64" ;;
          aarch64|arm64) ARCH="aarch64" ;;
          *) echo "::warning::Unsupported architecture: $ARCH"; exit 1 ;;
        esac
        BINARY_NAME="coral-${OS}-${ARCH}"
        DOWNLOAD_URL="https://github.com/daisuke8000/coral/releases/download/${CORAL_VERSION}/${BINARY_NAME}"
        echo "::notice::Downloading Coral binary from ${DOWNLOAD_URL}"
        if curl -sfL "$DOWNLOAD_URL" -o "${ACTION_PATH}/coral-bin"; then
          chmod +x "${ACTION_PATH}/coral-bin"
          echo "CORAL_BIN=${ACTION_PATH}/coral-bin" >> "$GITHUB_ENV"
        else
          echo "::notice::Pre-built binary not available, will build from source"
          exit 1
        fi

    - name: Setup Rust toolchain
      if: steps.download-coral.outcome == 'failure'
      uses: dtolnay/rust-toolchain@stable

    - name: Cache Cargo
      if: steps.download-coral.outcome == 'failure'
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
        key: coral-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          coral-${{ runner.os }}-

    - name: Build Coral from source
      if: steps.download-coral.outcome == 'failure'
      shell: bash
      env:
        ACTION_PATH: ${{ github.action_path }}
      run: |
        cd "$ACTION_PATH"
        cargo build --release
        echo "CORAL_BIN=${ACTION_PATH}/target/release/coral" >> "$GITHUB_ENV"

    - name: Generate proto graph
      id: generate
      shell: bash
      env:
        PROTO_PATH: ${{ inputs.proto-path }}
        BUF_CONFIG: ${{ inputs.buf-config }}
        WORKSPACE: ${{ github.workspace }}
      run: |
        mkdir -p "${WORKSPACE}/coral-output"
        cd "$PROTO_PATH"

        BUF_ARGS=""
        if [ -n "$BUF_CONFIG" ]; then
          BUF_ARGS="--config ${BUF_CONFIG}"
        fi

        buf build $BUF_ARGS -o - | "$CORAL_BIN" --output json > \
          "${WORKSPACE}/coral-output/graph.json"

        MARKDOWN=$(buf build $BUF_ARGS -o - | "$CORAL_BIN" --output markdown)

        echo "json-path=coral-output/graph.json" >> "$GITHUB_OUTPUT"
        DELIMITER="$(openssl rand -hex 16)"
        {
          echo "markdown-report<<${DELIMITER}"
          echo "$MARKDOWN"
          echo "${DELIMITER}"
        } >> "$GITHUB_OUTPUT"

    - name: Generate base branch data for diff
      if: inputs.comment-on-pr == 'true' && github.event_name == 'pull_request'
      id: diff
      shell: bash
      env:
        PROTO_PATH: ${{ inputs.proto-path }}
        BUF_CONFIG: ${{ inputs.buf-config }}
        BASE_REF: ${{ github.base_ref }}
        WORKSPACE: ${{ github.workspace }}
      run: |
        HEAD_SHA=$(git rev-parse HEAD)

        git fetch origin "$BASE_REF" --depth=1
        git checkout "origin/$BASE_REF"

        cd "$PROTO_PATH"

        BUF_ARGS=""
        if [ -n "$BUF_CONFIG" ]; then
          BUF_ARGS="--config ${BUF_CONFIG}"
        fi

        buf build $BUF_ARGS -o - | "$CORAL_BIN" --output json > \
          "${WORKSPACE}/coral-output/base.json"

        git checkout "$HEAD_SHA"

        DIFF_REPORT=$("$CORAL_BIN" diff \
          "${WORKSPACE}/coral-output/base.json" \
          "${WORKSPACE}/coral-output/graph.json")

        DELIMITER="$(openssl rand -hex 16)"
        {
          echo "diff-report<<${DELIMITER}"
          echo "$DIFF_REPORT"
          echo "${DELIMITER}"
        } >> "$GITHUB_OUTPUT"

    - name: Setup Node.js for UI build
      if: inputs.generate-pages == 'true'
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Build UI for GitHub Pages
      if: inputs.generate-pages == 'true'
      shell: bash
      working-directory: ${{ github.action_path }}/ui
      run: |
        npm ci
        npm run build:static

    - name: Generate GitHub Pages
      if: inputs.generate-pages == 'true'
      id: pages
      shell: bash
      env:
        ACTION_PATH: ${{ github.action_path }}
      run: |
        cp -r "${ACTION_PATH}/ui/dist" "coral-output/html"
        cp "coral-output/graph.json" "coral-output/html/"
        echo "html-path=coral-output/html" >> "$GITHUB_OUTPUT"

    - name: Post PR Comment
      if: inputs.comment-on-pr == 'true' && github.event_name == 'pull_request'
      uses: actions/github-script@v7
      env:
        MARKDOWN_REPORT: ${{ steps.generate.outputs.markdown-report }}
        DIFF_REPORT: ${{ steps.diff.outputs.diff-report }}
      with:
        github-token: ${{ inputs.github-token || github.token }}
        script: |
          const markdownReport = process.env.MARKDOWN_REPORT || '';
          const diffReport = process.env.DIFF_REPORT || '';

          let body = '';

          // Show only diff report for PR comments
          body = '## 🪸 Coral Proto Dependency Analysis\n\n' + (diffReport.trim() || '### No Changes Detected\n\nNo proto schema changes in this PR.');

          const { data: comments } = await github.rest.issues.listComments({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
          });

          const existingComment = comments.find(c =>
            c.user.type === 'Bot' && c.body.includes('Coral Proto Dependency Analysis')
          );

          if (existingComment) {
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: existingComment.id,
              body: body.trim()
            });
          } else {
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body.trim()
            });
          }

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: coral-${{ github.run_id }}
        path: coral-output
        retention-days: 1
        overwrite: true
